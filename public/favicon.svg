<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1208" />
      <stop offset="100%" stop-color="#08080f" />
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c87b8" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#4a5078" />
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#ffb648" />
      <stop offset="100%" stop-color="#d44a3a" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" />
    </filter>
  </defs>

  <!-- Dark cosmic background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Stars -->
  <circle cx="12" cy="14" r="1" fill="#fff" opacity="0.85" />
  <circle cx="52" cy="18" r="0.8" fill="#fff" opacity="0.7" />
  <circle cx="46" cy="48" r="1" fill="#ffb648" opacity="0.8" />
  <circle cx="14" cy="46" r="0.8" fill="#d44a3a" opacity="0.75" />
  <circle cx="56" cy="36" r="0.6" fill="#fff" opacity="0.6" />

  <!-- Flame glow underneath -->
  <ellipse cx="32" cy="54" rx="6" ry="3" fill="#ffb648" opacity="0.5" filter="url(#glow)" />

  <!-- Flame -->
  <path d="M27 46 Q32 60 37 46 Z" fill="url(#flame)" />

  <!-- Rocket body -->
  <path d="M32 8
           Q40 18 40 30
           L40 44
           L24 44
           L24 30
           Q24 18 32 8 Z"
        fill="url(#body)" />

  <!-- Red nose accent -->
  <path d="M32 8 L37 22 L27 22 Z" fill="#d44a3a" />

  <!-- Cockpit window -->
  <circle cx="32" cy="28" r="4" fill="#ffb648" stroke="#fff" stroke-width="0.8" />
  <circle cx="30.6" cy="26.6" r="1.2" fill="#fff" opacity="0.85" />

  <!-- Fins -->
  <path d="M24 38 L18 46 L24 46 Z" fill="#d44a3a" />
  <path d="M40 38 L46 46 L40 46 Z" fill="#d44a3a" />

  <!-- Body stripe -->
  <rect x="24" y="34" width="16" height="2" fill="#d44a3a" opacity="0.85" />
</svg>
