[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — any deep-link / refresh hits index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term cache for fingerprinted Vite assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-term cache for the GLB + textures in public/models/
[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
